# Lightweight compose for local backend development.
# Runs ONLY PostgreSQL — the app runs on the host via ./gradlew run.
# Usage:
#   docker compose -f docker-compose.db.yml up -d
#   docker compose -f docker-compose.db.yml down        # stop
#   docker compose -f docker-compose.db.yml down -v      # stop + wipe data
services:
  db:
    image: postgres:16
    container_name: ibms-postgres-dev
    environment:
      POSTGRES_DB: ibms
      POSTGRES_USER: ibms
      POSTGRES_PASSWORD: ibms
    ports:
      - "5433:5432"
    volumes:
      - ibms-pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ibms -d ibms"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ibms-pgdata-dev:
