product: jvm/app

dependencies:
  # --- Ktor server ---
  - $ktor.serialization.kotlinx.json
  - $ktor.server.auth
  - $ktor.server.auth.jwt
  - $ktor.server.callLogging
  - $ktor.server.config.yaml
  - $ktor.server.contentNegotiation
  - $ktor.server.core
  - $ktor.server.cors
  - $ktor.server.metrics.micrometer
  - $ktor.server.netty
  - $ktor.server.requestValidation
  - $ktor.server.statusPages
  # --- Data access ---
  - $libs.exposed.core
  - $libs.exposed.jdbc
  - $libs.exposed.java.time
  - $libs.hikaricp
  - $libs.flyway.core
  - $libs.flyway.database.postgresql
  - $libs.postgresql
  # --- Shared domain ---
  - $libs.kotlinx.datetime
  # --- Auth ---
  - $libs.google.api.client
  # --- Excel export ---
  - $libs.poi.ooxml
  # --- Logging / metrics ---
  - $libs.logback.classic
  - $libs.micrometer.registryPrometheus

test-dependencies:
  - $ktor.server.testHost
  - $libs.kotest.runner.junit5
  - $libs.kotest.assertions.core
  - $libs.mockk
  - $libs.testcontainers.postgresql

settings:
  ktor: enabled
  kotlin:
    serialization: enabled
